<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>NusantaraPulse | Industri</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style_industri.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <span class="numbering">.04</span>
            <h1>SEKTOR <span class="accent">INDUSTRI</span></h1>
        </header>

        <section class="calculator-grid">
            <form method="POST" class="glass-card">
                <div class="input-group">
                    <label>Biaya Tetap (Sewa/Listrik)</label>
                    <input type="number" name="biaya_tetap" step="any" required placeholder="Rp">
                </div>
                <div class="input-group">
                    <label>Harga Jual /Unit</label>
                    <input type="number" name="harga_unit" step="any" required placeholder="Rp">
                </div>
                <div class="input-group">
                    <label>Biaya Variabel /Unit</label>
                    <input type="number" name="biaya_var" step="any" required placeholder="Rp">
                </div>
                <button type="submit" class="btn-calc">Hitung Titik Impas</button>
            </form>

            {% if hasil %}
            <div class="glass-card result-card">
                <div class="stat">
                    <p>Break-Even Point (BEP)</p>
                    <h2>{{ hasil.bep_unit }} <small>Unit</small></h2>
                </div>
                <p>Anda harus menjual minimal {{ hasil.bep_unit }} produk untuk mulai mendapatkan keuntungan.</p>
            </div>
            {% endif %}
        </section>
    </div>

   <nav class="dock-container">
    <div class="dock">
        <a href="/" class="dock-item" title="Home"><i class="bi bi-house-door"></i></a>
        
        <a href="/perikanan" class="dock-item" title="Perikanan"><i class="bi bi-anchor"></i></a>
        
        <a href="/pertanian" class="dock-item" title="Pertanian"><i class="bi bi-leaf"></i></a>
        
        <a href="/industri" class="dock-item" title="Industri"><i class="bi bi-gear"></i></a>
        
        <a href="/kreator" class="dock-item" title="Kreator"><i class="bi bi-camera"></i></a>
        
        <a href="/moreinfo" class="dock-item" title="More Info"><i class="bi bi-info-circle"></i></a>
    </div>
  </nav>
    <script src="{{ url_for('static', filename='js/format.js') }}"></script>
</body>
</html>
