<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>NusantaraPulse | Kreator</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style_kreator.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <span class="numbering">.05</span>
            <h1>SEKTOR <span class="accent">KREATOR</span></h1>
        </header>

        <section class="calculator-grid">
            <form method="POST" class="glass-card">
                <div class="input-group">
                    <label>Harga Beli Alat (Kamera/PC)</label>
                    <input type="number" name="harga_alat" step="any" required placeholder="Rp">
                </div>
                <div class="input-group">
                    <label>Umur Alat (Bulan)</label>
                    <input type="number" name="umur_alat" step="any" required placeholder="Contoh: 24">
                </div>
                <div class="input-group">
                    <label>Proyek /Bulan</label>
                    <input type="number" name="proyek" step="any" required placeholder="0">
                </div>
                <button type="submit" class="btn-calc">Hitung Biaya Alat</button>
            </form>

            {% if hasil %}
            <div class="glass-card result-card">
                <div class="stat">
                    <p>Biaya Alat per Proyek</p>
                    <h2>Rp {{ "{:,.0f}".format(hasil.biaya_alat) }}</h2>
                </div>
                <p>Tabungkan jumlah di atas setiap proyek agar bisa upgrade alat setelah {{ hasil.total_proyek }} proyek.</p>
            </div>
            {% endif %}
        </section>
    </div>

    <nav class="dock-container">
    <div class="dock">
        <a href="/" class="dock-item" title="Home"><i class="bi bi-house-door"></i></a>
        
        <a href="/perikanan" class="dock-item" title="Perikanan"><i class="bi bi-anchor"></i></a>
        
        <a href="/pertanian" class="dock-item" title="Pertanian"><i class="bi bi-leaf"></i></a>
        
        <a href="/industri" class="dock-item" title="Industri"><i class="bi bi-gear"></i></a>
        
        <a href="/kreator" class="dock-item" title="Kreator"><i class="bi bi-camera"></i></a>
        
        <a href="/moreinfo" class="dock-item" title="More Info"><i class="bi bi-info-circle"></i></a>
    </div>
  </nav>
    <script src="{{ url_for('static', filename='js/format.js') }}"></script>
</body>
</html>
